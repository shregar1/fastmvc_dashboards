[project]
name = "fastmvc_dashboards"
version = "0.1.0"
description = "Dashboards extension for FastMVC (health, API, queues, tenants, secrets, workflows)."
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["fastmvc_core>=0.1.0"]

[project.urls]
Homepage = "https://github.com/your-org/fastmvc_dashboards"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

